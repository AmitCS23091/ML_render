<!DOCTYPE html>
<html>
<head>
    <title>Loan Approval Predictor</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="wrapper">
    <div class="card">
        <h2>💰 Loan Approval Predictor</h2>

        <form action="/predict" method="POST">

            <div class="input-group">
                <label>Income</label>
                <input type="number" name="income" required>
            </div>

            <div class="input-group">
                <label>Credit Score</label>
                <input type="number" name="credit_score" required>
            </div>

            <div class="input-group">
                <label>Loan Amount</label>
                <input type="number" name="loan_amount" required>
            </div>

            <div class="input-group">
                <label>Employment</label>
                <select name="employment">
                    <option value="1">Employed</option>
                    <option value="0">Not Employed</option>
                </select>
            </div>

            <button type="submit">Check Loan Status</button>

        </form>
    </div>
</div>

</body>
</html>
