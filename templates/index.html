<!DOCTYPE html>
<html>
<head>
    <title>Loan Approval Predictor</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h2>Loan Approval Predictor</h2>

    <form action="/predict" method="POST">
        <input type="number" name="income" placeholder="Income" required>
        <input type="number" name="credit_score" placeholder="Credit Score" required>
        <input type="number" name="loan_amount" placeholder="Loan Amount" required>

        <select name="employment">
            <option value="1">Employed</option>
            <option value="0">Not Employed</option>
        </select>

        <button type="submit">Check Loan Status</button>
    </form>
</div>

</body>
</html>
